<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadLearn</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>RadLearn</h1>

<!-- LOGIN -->

<div id="loginCard">

<h2>Login</h2>

<input
  type="email"
  id="email"
  placeholder="Email">

<input
  type="password"
  id="password"
  placeholder="Password">

<button id="btnLogin">
  Login
</button>

<p id="loginMsg"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none;">

<h2>Velkommen</h2>

<button id="btnNewCase">
  Ny læringscase
</button>

<button id="btnMyCases">
  Mine cases
</button>

<button id="btnLogout">
  Logout
</button>

</div>

<script src="app.js"></script>

</body>
</html>
