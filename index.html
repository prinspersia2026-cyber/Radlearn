<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadLearn</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>RadLearn</h1>

<!-- LOGIN -->

<div id="loginCard">

<h2>Login</h2>

<input
  type="email"
  id="email"
  placeholder="Email">

<input
  type="password"
  id="password"
  placeholder="Password">

<button id="btnLogin">
  Login
</button>

<p id="loginMsg"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none;">

<h2>Velkommen</h2>

<button id="btnNewCase">
  Ny læringscase
</button>

<button id="btnMyCases">
  Mine cases
</button>

<button id="btnLogout">
  Logout
</button>

</div>

<div id="newCaseCard" style="display:none;">

  <h2>Ny læringscase</h2>

  <input id="caseTitle" placeholder="Titel">

  <select id="caseModality">
    <option value="CT">CT</option>
    <option value="MR">MR</option>
    <option value="Røntgen">Røntgen</option>
    <option value="UL">UL</option>
    <option value="PET/CT">PET/CT</option>
    <option value="Andet">Andet</option>
  </select>

  <select id="caseOrgan">
    <option value="Hjerne">Hjerne</option>
    <option value="Hoved/Hals">Hoved/Hals</option>
    <option value="Thorax">Thorax</option>
    <option value="Abdomen">Abdomen</option>
    <option value="Bækken">Bækken</option>
    <option value="Columna">Columna</option>
    <option value="MSK">MSK</option>
    <option value="Kar">Kar</option>
    <option value="Andet">Andet</option>
  </select>

  <h3>Fejltype</h3>
  <label><input type="checkbox" class="errorType" value="Perceptuel"> Perceptuel</label>
  <label><input type="checkbox" class="errorType" value="Kognitiv"> Kognitiv</label>
  <label><input type="checkbox" class="errorType" value="Kommunikationsfejl"> Kommunikationsfejl</label>
  <label><input type="checkbox" class="errorType" value="Systemfejl"> Systemfejl</label>

  <textarea id="clinicalContext" placeholder="Hvorfor blev undersøgelsen udført?"></textarea>
  <textarea id="errorDescription" placeholder="Hvad gik galt?"></textarea>
  <textarea id="correctInterpretation" placeholder="Korrekt fortolkning"></textarea>
  <textarea id="prevention" placeholder="Hvordan kunne fejlen forebygges?"></textarea>
  <textarea id="learningPoints" placeholder="Læringspunkter"></textarea>

  <label>
    <input type="checkbox" id="anonymous" checked>
    Indsend anonymt
  </label>

  <label>
    <input type="checkbox" id="contactAllowed">
    Administrator må kontakte mig
  </label>

  <button id="btnSubmitCase">Indsend læringscase</button>
  <button id="btnBackDashboard">Tilbage</button>

  <p id="caseMsg"></p>

</div>

<script>
alert("inline script virker");
</script>  

<script src="app.js"></script>

</body>
</html>
